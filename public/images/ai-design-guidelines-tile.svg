<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI assists. The user decides.">
  <defs>
    <radialGradient id="tile-glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="900" fill="#FFF4E6"/>
  <circle cx="1000" cy="180" r="260" fill="url(#tile-glow)"/>

  <!-- giant type -->
  <g font-family="'Bricolage Grotesque', Inter, system-ui, -apple-system, sans-serif" font-weight="800" letter-spacing="-5">
    <text x="80" y="420" font-size="180" fill="#0E0E0E">AI assists.</text>
    <text x="80" y="620" font-size="180" fill="#0E0E0E">
      <tspan>The user</tspan>
    </text>
    <text x="80" y="800" font-size="180" font-style="italic" fill="#7C3AED">decides.</text>
  </g>

  <!-- sparkle -->
  <g transform="translate(1060, 720)" fill="#7C3AED">
    <path d="M30 0 L36 24 L60 30 L36 36 L30 60 L24 36 L0 30 L24 24 Z"/>
  </g>
</svg>
