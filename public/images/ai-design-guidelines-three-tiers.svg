<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three tiers of AI presence: Micro inline assistance, Mid suggestion container, Main dedicated workflow.">
  <defs>
    <linearGradient id="ai-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FF6FA8" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="drawer-shadow" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="12" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#FFF4E6"/>

  <!-- ─── Column 1: Micro ───────────────────────────── -->
  <g transform="translate(80, 80)">
    <text font-family="'Bricolage Grotesque', Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0E0E0E">Micro</text>
    <text y="36" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6A6256" letter-spacing="1">INLINE ASSISTANCE</text>
    <text y="68" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6A6256">A button. A snippet. Whitespace.</text>

    <!-- mockup: a button with sparkle -->
    <g transform="translate(0, 130)">
      <rect width="280" height="64" rx="32" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="2"/>
      <g transform="translate(28, 32)" fill="#7C3AED">
        <path d="M12 0 L15 9 L24 12 L15 15 L12 24 L9 15 L0 12 L9 9 Z"/>
      </g>
      <text x="68" y="40" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#0E0E0E">Summarize</text>
    </g>

    <!-- generated snippet on subtle tint -->
    <g transform="translate(0, 250)">
      <rect width="420" height="180" rx="14" fill="#F1EAFD"/>
      <g transform="translate(24, 28)" fill="#7C3AED">
        <path d="M9 0 L11 7 L18 9 L11 11 L9 18 L7 11 L0 9 L7 7 Z"/>
      </g>
      <text x="50" y="42" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#7C3AED" letter-spacing="1">AI SUMMARY</text>
      <line x1="24" y1="76"  x2="396" y2="76"  stroke="#0E0E0E" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
      <line x1="24" y1="106" x2="340" y2="106" stroke="#0E0E0E" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
      <line x1="24" y1="136" x2="370" y2="136" stroke="#0E0E0E" stroke-width="3" stroke-opacity="0.45" stroke-linecap="round"/>
    </g>

    <!-- footnote -->
    <text y="780" font-family="Inter, system-ui, sans-serif" font-size="14" font-style="italic" fill="#6A6256">Edit or discard. Never auto-saved.</text>
  </g>

  <!-- ─── Column 2: Mid ────────────────────────────── -->
  <g transform="translate(580, 80)">
    <text font-family="'Bricolage Grotesque', Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0E0E0E">Mid</text>
    <text y="36" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6A6256" letter-spacing="1">SUGGESTION CONTAINER</text>
    <text y="68" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6A6256">The container is the boundary.</text>

    <!-- contained card with AI gradient -->
    <g transform="translate(0, 130)">
      <rect width="440" height="540" rx="20" fill="url(#ai-grad)" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.35"/>

      <!-- label -->
      <g transform="translate(24, 24)">
        <g transform="translate(0, 12)" fill="#7C3AED">
          <path d="M11 0 L13 8 L21 11 L13 13 L11 21 L9 13 L0 11 L9 8 Z"/>
        </g>
        <text x="32" y="22" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#7C3AED" letter-spacing="1">AI SUGGESTED CAUSES</text>
      </g>

      <!-- bullet 1 -->
      <g transform="translate(24, 84)">
        <rect width="392" height="124" rx="14" fill="#FFFFFF" fill-opacity="0.85"/>
        <text x="20" y="34" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0E0E0E">Why 1</text>
        <line x1="20" y1="60"  x2="360" y2="60"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="84"  x2="300" y2="84"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="108" x2="280" y2="108" stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>

      <!-- bullet 2 -->
      <g transform="translate(24, 224)">
        <rect width="392" height="124" rx="14" fill="#FFFFFF" fill-opacity="0.85"/>
        <text x="20" y="34" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0E0E0E">Why 2</text>
        <line x1="20" y1="60"  x2="350" y2="60"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="84"  x2="320" y2="84"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="108" x2="240" y2="108" stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>

      <!-- bullet 3 -->
      <g transform="translate(24, 364)">
        <rect width="392" height="124" rx="14" fill="#FFFFFF" fill-opacity="0.85"/>
        <text x="20" y="34" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0E0E0E">Why 3</text>
        <line x1="20" y1="60"  x2="340" y2="60"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="84"  x2="300" y2="84"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="108" x2="270" y2="108" stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>
    </g>

    <text y="780" font-family="Inter, system-ui, sans-serif" font-size="14" font-style="italic" fill="#6A6256">Editable. Regenerable. Saved only on review.</text>
  </g>

  <!-- ─── Column 3: Main ───────────────────────────── -->
  <g transform="translate(1090, 80)">
    <text font-family="'Bricolage Grotesque', Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#0E0E0E">Main</text>
    <text y="36" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#6A6256" letter-spacing="1">DEDICATED WORKFLOW</text>
    <text y="68" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#6A6256">The chat is the task.</text>

    <!-- tall drawer -->
    <g transform="translate(0, 130)" filter="url(#drawer-shadow)">
      <rect width="420" height="700" rx="20" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="2"/>

      <!-- header -->
      <line x1="0" y1="80" x2="420" y2="80" stroke="#0E0E0E" stroke-width="1" stroke-opacity="0.15"/>
      <circle cx="48" cy="40" r="22" fill="#7C3AED" fill-opacity="0.15"/>
      <g transform="translate(48, 40)" fill="#7C3AED">
        <path d="M-7 0 L-2 -7 L0 -14 L2 -7 L7 0 L2 7 L0 14 L-2 7 Z"/>
      </g>
      <text x="86" y="36" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#0E0E0E">EHS Agent</text>
      <text x="86" y="56" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6A6256">AI assistant · always available</text>

      <!-- chat: AI bubble -->
      <g transform="translate(20, 110)">
        <rect width="300" height="84" rx="14" fill="#FFE8C8"/>
        <line x1="20" y1="32"  x2="280" y2="32"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="54"  x2="240" y2="54"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>

      <!-- chat: user bubble -->
      <g transform="translate(100, 218)">
        <rect width="300" height="60" rx="14" fill="#0E0E0E"/>
        <line x1="20" y1="26"  x2="260" y2="26"  stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
      </g>

      <!-- chat: AI bubble (longer) -->
      <g transform="translate(20, 302)">
        <rect width="320" height="120" rx="14" fill="#FFE8C8"/>
        <line x1="20" y1="32"  x2="300" y2="32"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="56"  x2="280" y2="56"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
        <line x1="20" y1="80"  x2="260" y2="80"  stroke="#0E0E0E" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>
      </g>

      <!-- chat: user bubble -->
      <g transform="translate(120, 446)">
        <rect width="280" height="60" rx="14" fill="#0E0E0E"/>
        <line x1="20" y1="26"  x2="220" y2="26"  stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
      </g>

      <!-- input -->
      <g transform="translate(20, 600)">
        <rect width="380" height="56" rx="28" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="2"/>
        <text x="24" y="36" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6A6256">Ask anything…</text>
        <circle cx="354" cy="28" r="14" fill="#0E0E0E"/>
      </g>
    </g>

    <text y="900" font-family="Inter, system-ui, sans-serif" font-size="14" font-style="italic" fill="#6A6256">Outputs export. Never auto-overwrite.</text>
  </g>
</svg>
